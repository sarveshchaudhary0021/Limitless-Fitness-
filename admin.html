<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – Limitless Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: var(--bg); color: var(--text-1); transition: background 0.3s, color 0.3s; font-family: 'Inter', sans-serif; }
    .admin-container { max-width: var(--max-w); margin: 6rem auto; padding: 0 2rem; }
    .client-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 1rem; }
    .client-table th, .client-table td { padding: 1.25rem 1.5rem; text-align: left; }
    .client-table th { font-weight: 700; color: var(--text-3); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
    .client-table tr td { background: var(--bg-2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); transition: var(--transition); }
    .client-table tr td:first-child { border-left: 1px solid var(--border); border-radius: 12px 0 0 12px; }
    .client-table tr td:last-child { border-right: 1px solid var(--border); border-radius: 0 12px 12px 0; }
    .client-table tr:hover td { background: var(--bg-3); border-color: var(--primary-color); }
    .goal-badge { padding: 4px 12px; border-radius: var(--radius-pill); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; background: var(--bg); color: var(--primary-color); border: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="admin-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 3rem;">
      <div>
        <h2 style="margin: 0;"><i class="fa-solid fa-infinity" style="color:var(--primary-color);"></i> Limitless <span style="font-weight:400; color:var(--text-2);">Admin</span></h2>
        <p id="clientCount" style="color:var(--text-3); font-size:0.9rem; margin-top:0.5rem; font-weight:500;">0 Total Clients</p>
      </div>
      <div class="nav-actions">
        <a href="index.html" class="btn btn-outline" style="padding: 0.5rem 1.2rem; font-size:0.9rem;"><i class="fas fa-arrow-left"></i> Exit Admin</a>
        <button class="theme-toggle-btn" aria-label="Toggle theme">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </div>
    
    <div style="overflow-x: auto;">
      <table class="client-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Fitness Goal</th>
            <th>Direct Message</th>
            <th>Date Joined</th>
          </tr>
        </thead>
        <tbody id="clientsList">
          <tr><td colspan="6" style="text-align:center; padding: 3rem; color:var(--text-2);">Loading secure database...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadClients() {
      try {
        const res = await fetch('/api/clients');
        const data = await res.json();
        const tbody = document.getElementById('clientsList');
        const count = document.getElementById('clientCount');
        
        count.innerText = `${data.count} Total Clients`;

        if (data.clients.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 3rem; color: var(--text-2);">No client prospects yet. The database is empty.</td></tr>';
          return;
        }

        tbody.innerHTML = data.clients.map(c => `
          <tr>
            <td style="color: var(--text-2); font-weight:600;">#${c.id}</td>
            <td style="font-weight: 600; color: var(--text-1);">${c.name}</td>
            <td style="color: var(--primary-color);"><a href="mailto:${c.email}" style="color:inherit; text-decoration:none;">${c.email}</a></td>
            <td><span class="goal-badge">${c.goal}</span></td>
            <td class="msg-cell" title="${c.message}">${c.message || 'No message provided.'}</td>
            <td class="date-text">${new Date(c.created_at).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })}</td>
          </tr>
        `).join('');
      } catch (err) {
        document.getElementById('clientsList').innerHTML = '<tr><td colspan="6" style="text-align:center; padding:3rem; color: #ef4444;"><i class="fas fa-exclamation-circle"></i> Failed to connect to MySQL database. Ensure server is running.</td></tr>';
      }
    }
    
    // Auto-refresh every 30 seconds
    loadClients();
    setInterval(loadClients, 30000);
  </script>
  <script src="cursor.js"></script>
<script src="js/ai-coach.js"></script>
</body>
</html>
