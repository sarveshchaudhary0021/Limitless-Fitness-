<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Limitless Fitness</title>
  <meta name="description" content="Sign in to your Limitless Fitness account and continue your transformation." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/auth.css" />
</head>
<body>
<div class="auth-page">

  <!-- ══════════════════════════════════
       LEFT — Brand panel
  ══════════════════════════════════ -->
  <div class="auth-brand">
    <div class="auth-brand__top">
      <a href="index.html" class="auth-logo">LIMITLESS</a>
    </div>

    <div class="auth-brand__body">
      <h1 class="auth-brand__headline">
        YOUR<br>
        IRON WILL<br>
        <em>AWAITS.</em>
      </h1>
      <p class="auth-brand__sub">
        Elite tools for elite results. Sign in to continue your transformation journey.
      </p>
      <div class="auth-brand__stats">
        <div>
          <span class="auth-brand__stat-num">1,200+</span>
          <span class="auth-brand__stat-label">Members</span>
        </div>
        <div>
          <span class="auth-brand__stat-num">85+</span>
          <span class="auth-brand__stat-label">Exercises</span>
        </div>
        <div>
          <span class="auth-brand__stat-num">98%</span>
          <span class="auth-brand__stat-label">Satisfaction</span>
        </div>
      </div>
    </div>

    <div class="auth-brand__accent-bar"></div>
  </div>

  <!-- ══════════════════════════════════
       RIGHT — Login form
  ══════════════════════════════════ -->
  <div class="auth-form-side">

    <a href="index.html" class="auth-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to home
    </a>

    <div class="auth-form-wrap">

      <h2 class="auth-form-title">Welcome back</h2>
      <p class="auth-form-sub">Sign in to your Limitless account</p>

      <!-- Error banner — shown by handleLogin on failure -->
      <div class="auth-error" id="form-error"></div>

      <form id="login-form" onsubmit="handleLogin(event)" novalidate>

        <!-- Email -->
        <div class="field-wrap">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Email address"
            autocomplete="email"
            required
          />
        </div>

        <!-- Password -->
        <div class="field-wrap field-wrap--password">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            autocomplete="current-password"
            required
          />
          <button
            type="button"
            class="pw-toggle"
            id="pw-toggle-login"
            aria-label="Show password"
            onclick="togglePw('password','pw-toggle-login')"
          >
            <!-- Eye icon — swaps to eye-off via JS -->
            <svg id="eye-login" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <!-- Forgot password link -->
        <a href="forgot-password.html" class="auth-forgot">Forgot password?</a>

        <!-- Submit -->
        <button type="submit" class="auth-submit" id="login-btn">
          <span class="auth-submit__text">Sign In</span>
          <div class="auth-submit__dots" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
        </button>

      </form>

      <div class="auth-switch">
        Don't have an account?&nbsp;
        <a href="signup.html">Create one free &rarr;</a>
      </div>

    </div>
  </div>

</div><!-- /.auth-page -->

<script src="auth-client.js"></script>
<script>
/* ── Show/hide password toggle ───────────────── */
const EYE_OPEN = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const EYE_OFF  = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

function togglePw(inputId, btnId) {
  const input = document.getElementById(inputId);
  const icon  = document.getElementById('eye-' + btnId.replace('pw-toggle-', ''));
  const isHidden = input.type === 'password';
  input.type     = isHidden ? 'text' : 'password';
  icon.innerHTML = isHidden ? EYE_OFF : EYE_OPEN;
  input.focus();
}

/* ── Override handleLogin to manage button state ─ */
const _origLogin = window.handleLogin;
window.handleLogin = async function (e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('form-error');

  err.textContent = '';
  err.classList.remove('show');
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res = await fetch('http://localhost:5000/api/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email:    document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Login failed.');
    window.location.href = 'dashboard.html';
  } catch (ex) {
    err.textContent = ex.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.classList.remove('loading');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
};

/* ── Redirect if already authenticated ────────── */
(async () => {
  try {
    const res = await fetch('http://localhost:5000/api/auth/me', {
      credentials: 'include',
    });
    if (res.ok) window.location.replace('dashboard.html');
  } catch {}
})();
</script>
</body>
</html>
