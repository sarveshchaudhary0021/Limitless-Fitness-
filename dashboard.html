<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Limitless Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background-color: var(--bg); color: var(--text-1); font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; }
    .dash-nav { padding: 1rem 2rem; background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; }
    .dash-container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
    .form-control { width: 100%; padding: 0.8rem 1.2rem; background: var(--bg-2); border: 1px solid var(--border); color: var(--text-1); border-radius: var(--radius-md); box-sizing: border-box; margin-bottom: 1.2rem; transition: all 0.3s; outline: none; font-size: 0.95rem; }
    .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); background: var(--bg); }
    .log-btn { width: 100%; padding: 1rem; font-size: 1rem; }
    h2, h3 { letter-spacing: -0.5px; }
    @media (max-width: 768px) { .dash-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="dash-nav">
    <div class="nav-container" style="width:100%; display:flex; justify-content:space-between; align-items:center;">
      <a href="index.html" style="text-decoration:none;">
        <h2 style="margin: 0;"><i class="fa-solid fa-infinity" style="color:var(--primary-color);"></i> Limitless <span style="font-weight:400; color:var(--text-2);">Dashboard</span> <span id="user-name" style="margin-left:8px; font-size:1rem; color:var(--primary-color);"></span> <span id="proBadge" style="display:none; background:var(--primary-color); color:white; font-size:0.7rem; padding:2px 8px; border-radius:10px; vertical-align:middle; margin-left:10px;">PRO</span></h2>
      </a>
      <div class="nav-actions">
        <a href="generator.html" class="btn btn-glass" style="padding: 0.5rem 1rem;"><i class="fas fa-brain"></i> Generator</a>
        <button class="theme-toggle-btn" aria-label="Toggle theme">
          <span class="theme-icon">🌙</span>
        </button>
        <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1rem; border-color: #f43f5e; color:#f43f5e;"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
  </nav>

  <div class="dash-container">
    <!-- Today's Routine -->
    <div class="glass-card" id="todayRoutineCard">
      <h3 style="margin-top:0; color:var(--primary-color);"><i class="fas fa-calendar-day"></i> Today's Routine</h3>
      <div id="routineContent" style="margin-top: 1rem;">
        <p style="color:var(--text-2);">Loading your plan...</p>
      </div>
    </div>

    <!-- Log Workout -->
    <div class="glass-card">
      <h3 style="margin-top:0; color:var(--primary-color);"><i class="fas fa-plus-circle"></i> Log Workout</h3>
      <p style="color:var(--text-2); font-size:0.9rem; margin-bottom: 1.5rem;">Track your progressive overload instantly.</p>
      <form id="logForm">
        <select id="exercise" class="form-control" required>
          <option value="">Select Exercise...</option>
          <option value="Bench Press">Bench Press</option>
          <option value="Squat">Squat</option>
          <option value="Deadlift">Deadlift</option>
          <option value="Pull-Up">Pull-Up</option>
          <option value="Overhead Press">Overhead Press</option>
          <option value="Push-Up">Push-Up</option>
          <option value="Plank">Plank</option>
          <option value="Lunge">Lunge</option>
          <option value="Bicep Curl">Bicep Curl</option>
          <option value="Tricep Extension">Tricep Extension</option>
        </select>
        <div style="display:flex; gap:0.5rem;">
          <input type="number" id="sets" class="form-control" placeholder="Sets" min="1" required>
          <input type="number" id="reps" class="form-control" placeholder="Reps" min="1" required>
        </div>
        <input type="number" id="weight" class="form-control" placeholder="Weight (kg)" min="0" step="0.5" required>
        <button type="submit" class="btn btn-primary btn-full btn-glow">Save Workout</button>
      </form>
    </div>

    <!-- Quick Planner -->
    <div class="glass-card" style="grid-column: 1 / -1;">
      <h3 style="margin-top:0; color:var(--primary-color);"><i class="fas fa-bolt"></i> Quick Planner</h3>
      <p style="color:var(--text-2); font-size:0.9rem; margin-bottom: 1rem;">Instantly generate a customized workout and diet plan.</p>
      <form id="plannerForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
        <input type="number" id="planWeight" class="form-control" placeholder="Weight (kg)" required>
        <select id="planGoal" class="form-control" required>
          <option value="muscle-gain">Muscle Gain</option>
          <option value="fat-loss">Fat Loss</option>
          <option value="maintenance">Maintenance</option>
        </select>
        <select id="planDiet" class="form-control" required>
          <option value="non-veg">Non-Veg</option>
          <option value="veg">Vegetarian</option>
          <option value="vegan">Vegan</option>
        </select>
        <button type="submit" class="btn btn-outline" style="grid-column: 1 / -1;">Generate Plan</button>
      </form>
      <div id="plannerResult" style="margin-top: 1.5rem; display: none; padding: 1rem; background: var(--bg-2); border-radius: 8px; border: 1px solid var(--border);"></div>
    </div>

    <!-- Advanced Analytics (Python Powered) -->
    <div class="glass-card" style="grid-column: 1 / -1; display:flex; flex-direction:column;">
      <h3 style="margin-top:0; color:var(--primary-color);"><i class="fas fa-chart-pie"></i> Advanced Analytics</h3>
      <p style="color:var(--text-2); font-size:0.85rem; margin-bottom: 1rem;">📊 Powered by Python Data Engine</p>
      
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
        <div>
          <h4 style="margin-bottom: 0.5rem; color: var(--text-1);">30-Day Volume Heatmap</h4>
          <div style="width: 100%; height: 250px; position:relative;">
            <canvas id="progressChart"></canvas>
          </div>
        </div>
        <div>
          <h4 style="margin-bottom: 0.5rem; color: var(--text-1);">Muscle Distribution</h4>
          <div style="width: 100%; height: 250px; position:relative;">
            <canvas id="pieChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('limitless_token');
    if (!token) window.location.href = 'login.html';

    async function checkStatus() {
      try {
        const res = await fetch('/api/user/status', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success && data.user.subscription_plan !== 'free') {
          document.getElementById('proBadge').style.display = 'inline-block';
          document.getElementById('proBadge').textContent = data.user.subscription_plan.toUpperCase();
        }
      } catch (err) { console.error(err); }
    }

    // Load Today's Routine
    async function loadTodayRoutine() {
      try {
        const res = await fetch('/api/dashboard/today', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
          const r = data.routine;
          const html = `
            <div style="padding: 1.2rem; background: var(--bg-2); border-radius: 12px; border: 1px solid var(--border);">
              <div style="color: var(--primary-color); text-transform:uppercase; font-size: 0.8rem; letter-spacing:1px; margin-bottom: 0.5rem; font-weight:600;"><i class="fas fa-sun"></i> ${data.dayName}</div>
              <h4 style="margin: 0 0 0.5rem 0; font-size: 1.4rem;">${r.title}</h4>
              <p style="margin: 0 0 1rem 0; color: var(--text-2); display:flex; align-items:center; gap:0.5rem;"><i class="fas fa-crosshairs fa-sm"></i> Focus: ${r.target}</p>
              ${r.sets > 0 ? `<div style="display:inline-block; padding: 6px 14px; background: rgba(59,130,246,0.1); color: var(--primary-color); border-radius: 20px; font-weight: 500; font-size: 0.9rem;"><i class="fas fa-dumbbell"></i> ${r.sets} Sets × ${r.reps} Reps per exercise</div>` : '<div style="display:inline-block; padding: 6px 14px; background: rgba(16,185,129,0.1); color: #10b981; border-radius: 20px; font-weight: 500; font-size: 0.9rem;"><i class="fas fa-bed"></i> Recovery Day</div>'}
            </div>
          `;
          document.getElementById('routineContent').innerHTML = html;
        }
      } catch (err) { console.error('Failed to load today routine'); }
    }

    let progressChart, pieChartInst;

    async function loadAnalytics() {
      try {
        const res = await fetch('/api/dashboard/analytics', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
          renderCharts(data.heatmap, data.pieChart);
        } else {
          loadFallbackHistory();
        }
      } catch (err) { 
        console.error(err);
        loadFallbackHistory();
      }
    }

    async function loadFallbackHistory() {
      try {
        const res = await fetch('/api/workouts/history', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
          const dates = [...new Set(data.logs.map(log => log.date))];
          const heatmap = dates.map(date => ({
            date: date,
            volume: data.logs.filter(l => l.date === date).reduce((s, l) => s + (l.sets * l.reps * l.weight), 0)
          }));
          renderCharts(heatmap, { "No Python Data": 1 });
        }
      } catch (err) { console.error(err); }
    }

    function renderCharts(heatmapData, pieData) {
      const style = getComputedStyle(document.documentElement);
      const primaryColor = style.getPropertyValue('--primary-color').trim();
      const textColor = style.getPropertyValue('--text-2').trim();
      const gridColor = style.getPropertyValue('--border').trim();

      const ctxBar = document.getElementById('progressChart').getContext('2d');
      if (progressChart) progressChart.destroy();

      const gradient = ctxBar.createLinearGradient(0, 0, 0, 250);
      gradient.addColorStop(0, primaryColor);
      gradient.addColorStop(1, 'rgba(59, 130, 246, 0.05)');

      progressChart = new Chart(ctxBar, {
        type: 'bar',
        data: {
          labels: heatmapData.length ? heatmapData.map(d => d.date) : ['No Data'],
          datasets: [{
            label: 'Volume (kg)',
            data: heatmapData.length ? heatmapData.map(d => d.volume) : [0],
            backgroundColor: gradient,
            hoverBackgroundColor: primaryColor,
            borderRadius: 6,
            barPercentage: 0.6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { 
            legend: { display: false }
          },
          scales: {
            x: { ticks: { color: textColor, font: {family:'Inter'} }, grid: { display: false } },
            y: { beginAtZero: true, ticks: { color: textColor, font: {family:'Inter'} }, grid: { color: gridColor, borderDash: [5, 5] }, border: {display:false} }
          }
        }
      });

      const ctxPie = document.getElementById('pieChart').getContext('2d');
      if (pieChartInst) pieChartInst.destroy();

      const pieLabels = Object.keys(pieData);
      const pieValues = Object.values(pieData);
      
      const pieColors = ['#3b82f6', '#00c896', '#ff6b35', '#e63946', '#8b5cf6', '#f59e0b'];

      pieChartInst = new Chart(ctxPie, {
        type: 'doughnut',
        data: {
          labels: pieLabels.length ? pieLabels : ['No Data'],
          datasets: [{
            data: pieValues.length ? pieValues : [1],
            backgroundColor: pieColors,
            borderWidth: 0,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'right',
              labels: { color: textColor, font: { family: 'Inter', size: 12 }, padding: 15, boxWidth: 12 }
            }
          },
          cutout: '70%',
          animation: { animateScale: true, animateRotate: true }
        }
      });
    }

    document.getElementById('logForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        exercise: document.getElementById('exercise').value,
        sets: document.getElementById('sets').value,
        reps: document.getElementById('reps').value,
        weight: document.getElementById('weight').value
      };

      try {
        const res = await fetch('/api/workouts/log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          e.target.reset();
          loadAnalytics();
        } else {
          alert('Failed to log');
        }
      } catch (err) { alert('Error logging'); }
    });

    document.getElementById('plannerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        age: 25, 
        weight: document.getElementById('planWeight').value,
        goal: document.getElementById('planGoal').value,
        dietParams: { preference: document.getElementById('planDiet').value, region: 'western' }
      };

      try {
        const res = await fetch('/api/generate-plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
          const p = data.plan;
          const html = `
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem;">
              <div>
                <h4 style="color:var(--primary-color); margin-top:0; font-size:1.1rem;"><i class="fas fa-utensils"></i> Diet (${p.targetCalories} kcal)</h4>
                <ul style="padding-left:1.2rem; margin:0; color:var(--text-1); font-size:0.95rem; line-height:1.6;">
                  ${p.dailyDiet.map(item => `<li style="margin-bottom:0.5rem;">${item}</li>`).join('')}
                </ul>
              </div>
              <div>
                <h4 style="color:var(--primary-color); margin-top:0; font-size:1.1rem;"><i class="fas fa-dumbbell"></i> Weekly Routine</h4>
                <ul style="padding-left:1.2rem; margin:0; color:var(--text-1); font-size:0.95rem; line-height:1.6;">
                  ${p.weeklyRoutine.slice(0,5).map(item => `<li style="margin-bottom:0.5rem;">${item}</li>`).join('')}
                </ul>
              </div>
            </div>
          `;
          const resDiv = document.getElementById('plannerResult');
          resDiv.innerHTML = html;
          resDiv.style.opacity = 0;
          resDiv.style.display = 'block';
          setTimeout(() => {
            resDiv.style.transition = 'opacity 0.4s ease';
            resDiv.style.opacity = 1;
          }, 10);
        }
      } catch (err) { alert('Error generating plan'); }
    });

    function logout() {
      localStorage.removeItem('limitless_token');
      localStorage.removeItem('limitless_user');
      window.location.href = 'index.html';
    }

    checkStatus();
    loadTodayRoutine();
    loadAnalytics();

    (async () => {
      if (typeof authGuard === 'function') {
        const user = await authGuard();
        if (user) document.getElementById('user-name').textContent = user.name;
      }
    })();
  </script>
  <script src="cursor.js"></script>
  <script src="script.js"></script>
</body>
</html>
