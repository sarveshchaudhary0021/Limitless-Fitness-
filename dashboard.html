<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Limitless Fitness</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/global.css" />
  
  <script src="theme-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { background-color: var(--bg-base); color: var(--text-hi); font-family: var(--font-body); transition: background var(--transition), color var(--transition); }
    
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; padding: 14px 0; background: rgba(10,10,11,0.82); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); transition: background var(--transition), border-color var(--transition); }
    [data-theme="light"] .nav { background: rgba(255,255,255,0.82); }
    
    .nav__inner { display: flex; align-items: center; justify-content: space-between; }
    .nav__logo { font-family: var(--font-display); font-size: 22px; letter-spacing: 4px; color: var(--accent); text-decoration: none; display:flex; align-items:center; }
    
    .dash-container { max-width: 1200px; margin: 100px auto 40px; padding: 0 24px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
    
    .glass-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; box-shadow: var(--shadow-sm); transition: transform var(--transition-slow), border-color var(--transition); }
    .glass-card:hover { transform: translateY(-2px); border-color: var(--border-hover); }
    
    .badge-pro { background: var(--accent); color: white; font-family: var(--font-display); font-size: 14px; padding: 2px 8px; border-radius: 4px; letter-spacing: 1px; margin-left: 12px; vertical-align: middle; }
    
    .form-control { width: 100%; padding: 12px 16px; background: transparent; border: 1px solid var(--border); color: var(--text-hi); border-radius: var(--radius-sm); margin-bottom: 16px; font-family: var(--font-body); font-size: 15px; transition: border-color var(--transition); outline: none; }
    .form-control:focus { border-color: var(--accent); }
    .form-control option { background: var(--bg-surface); color: var(--text-hi); }
    
    .btn-full { width: 100%; display: block; text-align: center; }
    
    h3 { font-family: var(--font-display); font-size: 28px; letter-spacing: 1px; color: var(--text-hi); margin-bottom: 8px; }
    .subtitle { color: var(--text-mid); font-size: 14px; margin-bottom: 24px; }
    
    @media (max-width: 768px) { 
      .dash-container { grid-template-columns: 1fr; } 
    }
  </style>
</head>
<body>

  <nav class="nav" id="nav">
    <div class="container nav__inner">
      <a href="index.html" class="nav__logo">LIMITLESS<span style="color:var(--text-mid); font-weight:400; margin-left:8px; font-size:16px; padding-top:2px;">WORKSPACE</span></a>
      
      <div style="display:flex; align-items:center;">
        <span id="user-name" style="color:var(--text-hi); font-weight:600; font-size:14px; margin-right:4px;"></span>
        <span id="proBadge" class="badge-pro" style="display:none; margin-right:16px;">PRO</span>
        <button id="theme-btn" class="btn btn-ghost" aria-label="Toggle theme" style="padding:8px 12px; font-size:16px; margin-right:8px;">🌙</button>
        <button onclick="logout()" class="btn btn-ghost" style="padding: 8px 16px; font-size:13px; border-color: #f43f5e; color:#f43f5e;">Logout</button>
      </div>
    </div>
  </nav>

  <div class="dash-container">
    
    <!-- Today's Routine -->
    <div class="glass-card" id="todayRoutineCard">
      <h3>Today's Routine</h3>
      <div id="routineContent" style="margin-top: 1rem;">
        <p style="color:var(--text-mid);">Loading your plan...</p>
      </div>
    </div>

    <!-- Log Workout -->
    <div class="glass-card">
      <h3>Log Workout</h3>
      <p class="subtitle">Track your progressive overload instantly.</p>
      <form id="logForm">
        <select id="exercise" class="form-control" required>
          <option value="" disabled selected>Select Exercise...</option>
          <option value="Bench Press">Bench Press</option>
          <option value="Squat">Squat</option>
          <option value="Deadlift">Deadlift</option>
          <option value="Pull-Up">Pull-Up</option>
          <option value="Overhead Press">Overhead Press</option>
          <option value="Push-Up">Push-Up</option>
          <option value="Plank">Plank</option>
          <option value="Lunge">Lunge</option>
          <option value="Bicep Curl">Bicep Curl</option>
          <option value="Tricep Extension">Tricep Extension</option>
        </select>
        <div style="display:flex; gap:12px;">
          <input type="number" id="sets" class="form-control" placeholder="Sets" min="1" required>
          <input type="number" id="reps" class="form-control" placeholder="Reps" min="1" required>
        </div>
        <input type="number" id="weight" class="form-control" placeholder="Weight (kg)" min="0" step="0.5" required>
        <button type="submit" class="btn btn-primary btn-full">Save Workout</button>
      </form>
    </div>

    <!-- Quick Planner -->
    <div class="glass-card" style="grid-column: 1 / -1;">
      <h3>Quick Planner</h3>
      <p class="subtitle">Instantly generate a customized workout and diet plan using our AI logic.</p>
      <form id="plannerForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
        <input type="number" id="planWeight" class="form-control" style="margin-bottom:0;" placeholder="Weight (kg)" required>
        <select id="planGoal" class="form-control" style="margin-bottom:0;" required>
          <option value="" disabled selected>Select Goal...</option>
          <option value="cut">Fat Loss (Cut)</option>
          <option value="bulk">Muscle Gain (Bulk)</option>
          <option value="maintain">Maintenance</option>
        </select>
        <select id="planDiet" class="form-control" style="margin-bottom:0;" required>
          <option value="" disabled selected>Diet Preference...</option>
          <option value="balanced">Balanced</option>
          <option value="high-protein">High Protein Med Carbs</option>
          <option value="keto">Keto / Low Carb</option>
          <option value="vegan">Vegan High Protein</option>
        </select>
        <select id="planReligion" class="form-control" style="margin-bottom:0;" required>
          <option value="" disabled selected>Dietary Belief...</option>
          <option value="none">None / Any</option>
          <option value="hindu">Hindu (Sattvic friendly)</option>
          <option value="halal">Non Hindu / Halal</option>
          <option value="jain">Jain (No Root Veg)</option>
          <option value="sikh">Sikh (Jhatka / Pure Veg)</option>
          <option value="buddha">Buddhist (Mindful Plant-Based)</option>
        </select>
        <select id="planGeography" class="form-control" style="margin-bottom:0;" required>
          <option value="" disabled selected>Regional Spices...</option>
          <option value="western">Western / Continental</option>
          <option value="indian">Indian Spices (Desi)</option>
          <option value="asian">East Asian</option>
          <option value="middle-eastern">Middle Eastern</option>
        </select>
        <button type="submit" class="btn btn-ghost" style="grid-column: 1 / -1; padding-top:12px; padding-bottom:12px; margin-top:8px;">Generate Plan</button>
      </form>
      <div id="plannerResult" style="display: none; padding: 24px; background: rgba(0,0,0,0.1); border-radius: var(--radius-md); border: 1px solid var(--border);"></div>
    </div>

    <!-- Advanced Analytics -->
    <div class="glass-card" style="grid-column: 1 / -1; display:flex; flex-direction:column;">
      <h3>Advanced Analytics</h3>
      <p class="subtitle">Volume progression and muscle distribution visualizer.</p>
      
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 32px;">
        <div style="width: 100%; height: 300px; position:relative;">
          <canvas id="progressChart"></canvas>
        </div>
        <div style="width: 100%; height: 300px; position:relative;">
          <canvas id="pieChart"></canvas>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Theme logic
    const html = document.documentElement;
    const themeBtn = document.getElementById('theme-btn');
    
    function updateThemeBtn(theme) {
      themeBtn.textContent = (theme === 'light') ? '☀️' : '🌙';
    }
    
    themeBtn.addEventListener('click', () => {
      let current = html.getAttribute('data-theme') || 'dark';
      let next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('limitless_theme', next);
      updateThemeBtn(next);
      // Re-render charts on theme switch
      if(window.lastChartData) renderCharts(window.lastChartData.heatmap, window.lastChartData.pieChart);
    });
    updateThemeBtn(localStorage.getItem('limitless_theme') || 'dark');

    async function verifyAuth() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (!res.ok) throw new Error('Not authenticated');
        const data = await res.json();
        
        if (data.user && data.user.subscription_plan && data.user.subscription_plan !== 'free') {
          document.getElementById('proBadge').style.display = 'inline-block';
        }
        document.getElementById('user-name').textContent = data.user.name;
        return data.user;
      } catch (err) {
        window.location.href = 'login.html';
      }
    }

    async function loadTodayRoutine() {
      try {
        const res = await fetch('/api/dashboard/today', { credentials: 'include' });
        const data = await res.json();
        if (data.success) {
          const r = data.routine;
          document.getElementById('routineContent').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
              <h4 style="margin:0; font-size:18px; color:var(--text-hi);">${data.dayName}</h4>
            </div>
            <h5 style="margin:0 0 8px 0; font-size:22px; color:var(--accent);">${r.title}</h5>
            <p style="margin:0 0 16px 0; color:var(--text-mid); font-size:15px;">Target: ${r.target}</p>
            <div style="background:rgba(0,0,0,0.1); padding:16px; border-radius:var(--radius-sm); border:1px solid var(--border);">
              <span style="font-weight:600; color:var(--text-hi);">Suggested Volume:</span>
              <br> <span style="color:var(--text-mid);">${r.sets} Sets × ${r.reps} Reps per exercise.</span>
            </div>
          `;
        }
      } catch (err) {}
    }

    let progressChart, pieChartInst;

    async function loadAnalytics() {
      try {
        const res = await fetch('/api/dashboard/analytics', { credentials: 'include' });
        const data = await res.json();
        if (data.success) {
          window.lastChartData = data;
          renderCharts(data.heatmap, data.pieChart);
        } else {
          loadFallbackHistory();
        }
      } catch (err) {
        loadFallbackHistory();
      }
    }

    async function loadFallbackHistory() {
      try {
        const res = await fetch('/api/workouts/history', { credentials: 'include' });
        const data = await res.json();
        if (data.success) {
          const dates = [...new Set(data.logs.map(log => log.date))];
          const volumeArray = dates.map(date => {
            return data.logs.filter(l => l.date === date).reduce((sum, curr) => sum + (curr.sets * curr.reps * curr.weight), 0);
          });
          const heatmap = dates.map((d, i) => ({ date: d, count: volumeArray[i] }));
          window.lastChartData = { heatmap, pieChart: { labels: ['No Detailed Split Matrix'], data: [1] } };
          renderCharts(window.lastChartData.heatmap, window.lastChartData.pieChart);
        }
      } catch (err) { console.error(err); }
    }

    function renderCharts(heatmapData, pieData) {
      const style = getComputedStyle(document.documentElement);
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      
      const primaryColor = style.getPropertyValue('--accent').trim() || '#3b82f6';
      const textColor = style.getPropertyValue('--text-mid').trim() || '#8892b0';
      const gridColor = style.getPropertyValue('--border').trim() || 'rgba(255,255,255,0.1)';

      const ctxBar = document.getElementById('progressChart').getContext('2d');
      if (progressChart) progressChart.destroy();

      const gradient = ctxBar.createLinearGradient(0, 0, 0, 300);
      gradient.addColorStop(0, primaryColor);
      gradient.addColorStop(1, 'transparent');

      progressChart = new Chart(ctxBar, {
        type: 'line',
        data: {
          labels: heatmapData.length ? heatmapData.map(d => d.date) : ['No Data'],
          datasets: [{
            label: 'Volume Score',
            data: heatmapData.length ? heatmapData.map(d => d.count || d.volume) : [0],
            backgroundColor: gradient,
            borderColor: primaryColor,
            borderWidth: 2,
            pointBackgroundColor: primaryColor,
            pointBorderColor: isLight ? '#fff' : '#0a0a0b',
            pointRadius: 4,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: textColor, font: {family:'Plus Jakarta Sans'} }, grid: { display: false } },
            y: { beginAtZero: true, ticks: { color: textColor, font: {family:'Plus Jakarta Sans'} }, grid: { color: gridColor, borderDash: [5, 5] }, border: {display:false} }
          }
        }
      });

      const ctxPie = document.getElementById('pieChart').getContext('2d');
      if (pieChartInst) pieChartInst.destroy();

      const pieColors = [primaryColor, '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#6366f1'];

      pieChartInst = new Chart(ctxPie, {
        type: 'doughnut',
        data: {
          labels: pieData.labels ? pieData.labels : ['No Data'],
          datasets: [{
            data: pieData.data ? pieData.data : [1],
            backgroundColor: pieColors,
            borderColor: style.getPropertyValue('--bg-surface').trim() || (isLight ? '#fff' : '#141416'),
            borderWidth: 2,
            hoverOffset: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: textColor, font: { family: 'Plus Jakarta Sans', size: 12 }, padding: 15, boxWidth: 12 }
            }
          },
          cutout: '75%',
          animation: { animateScale: true, animateRotate: true }
        }
      });
    }

    document.getElementById('logForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        exercise: document.getElementById('exercise').value,
        sets: document.getElementById('sets').value,
        reps: document.getElementById('reps').value,
        weight: document.getElementById('weight').value
      };

      try {
        const res = await fetch('/api/workouts/log', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          const btn = e.target.querySelector('button');
          btn.textContent = 'Logged ✔';
          btn.style.background = '#10b981';
          btn.style.borderColor = '#10b981';
          btn.style.color = '#fff';
          setTimeout(() => {
            btn.textContent = 'Save Workout';
            btn.style.background = '';
            btn.style.borderColor = '';
            btn.style.color = '';
            e.target.reset();
            loadAnalytics(); // Reload charts to reflect new data
          }, 2000);
        }
      } catch (err) { alert('Error logging workout'); }
    });

    document.getElementById('plannerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        weight: document.getElementById('planWeight').value,
        goal: document.getElementById('planGoal').value,
        dietPref: document.getElementById('planDiet').value,
        religion: document.getElementById('planReligion').value,
        geography: document.getElementById('planGeography').value
      };

      try {
        const res = await fetch('/api/generate-plan', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
          const resultDiv = document.getElementById('plannerResult');
          resultDiv.style.display = 'block';
          resultDiv.innerHTML = `
            <h4 style="color:var(--accent); font-size:20px; font-family:var(--font-display); margin:0 0 12px 0;">Your Customized Program</h4>
            <div style="margin-bottom:16px;">
              <strong style="color:var(--text-hi);">Diet Framework:</strong><br>
              <span style="color:var(--text-mid);">${data.diet}</span>
            </div>
            <div style="margin-bottom:16px;">
              <strong style="color:var(--text-hi);">Daily Meal Plan (Hit your calories):</strong><br>
              <ul style="color:var(--text-mid); padding-left:20px; margin-top:8px;">
                ${data.dailyMeals.map(m => '<li style="margin-bottom:4px;">'+m+'</li>').join('')}
              </ul>
            </div>
            <div>
              <strong style="color:var(--text-hi);">Training Split:</strong><br>
              <ul style="color:var(--text-mid); padding-left:20px; margin-top:8px;">
                ${data.routine.map(r => '<li style="margin-bottom:4px;">'+r+'</li>').join('')}
              </ul>
            </div>
          `;
        }
      } catch (err) { alert('Error generating plan'); }
    });

    async function logout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      } catch (e) {}
      localStorage.removeItem('limitless_theme');
      window.location.href = 'login.html';
    }

    (async () => {
      await verifyAuth();
      loadTodayRoutine();
      loadAnalytics();
    })();
  </script>
</body>
</html>
