<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Limitless Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111; --border: #1e1e1e;
    --accent: #e8ff47; --text: #f0f0f0; --muted: #666;
    --error: #ef4444; --success: #22c55e; --radius: 10px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    width: 100%; max-width: 420px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 36px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
    letter-spacing: 0.18em; color: var(--accent); text-decoration: none;
    display: block; margin-bottom: 32px;
  }
  h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.05em; margin-bottom: 8px; }
  p.sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 28px; line-height: 1.5; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 7px; }
  .form-group input {
    width: 100%; background: #0a0a0a; border: 1px solid var(--border);
    color: var(--text); padding: 12px 14px; border-radius: var(--radius);
    font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; background: var(--accent); color: #000; border: none;
    padding: 13px; border-radius: var(--radius); cursor: pointer;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 0.1em;
    margin-top: 8px; transition: opacity 0.2s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .alert { padding: 11px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
  .alert.visible { display: block; }
  .alert.error   { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .alert.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
  .footer { text-align: center; color: var(--muted); font-size: 0.85rem; margin-top: 20px; }
  .footer a { color: var(--accent); text-decoration: none; }
  .strength-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; }
  .strength-bar { height: 100%; width: 0; transition: width 0.3s, background 0.3s; }
  .strength-label { font-size: 0.72rem; margin-top: 4px; color: var(--muted); }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <a href="./index.html" class="logo">LIMITLESS</a>
  <h2>Reset Password</h2>
  <p class="sub">Enter your email and choose a new password. Your account data stays intact.</p>

  <div class="alert error"   id="alert-error"   role="alert"></div>
  <div class="alert success" id="alert-success" role="alert"></div>

  <form id="reset-form" novalidate>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label for="new-password">New Password</label>
      <input type="password" id="new-password" placeholder="Min. 8 chars, 1 uppercase, 1 number" required>
      <div class="strength-bar-wrap"><div class="strength-bar" id="strength-bar"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>
    <div class="form-group">
      <label for="confirm-password">Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat new password" required>
    </div>
    <button type="submit" class="btn" id="submit-btn">Reset Password</button>
  </form>

  <div class="footer"><a href="./login.html">← Back to Sign In</a></div>
</div>

<script src="./js/auth.js"></script>
<script>
  function getPasswordStrength(v) {
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    if (score === 0) return { score: 0, label: 'Very Weak', color: '#ef4444' };
    if (score === 1) return { score: 1, label: 'Weak', color: '#f59e0b' };
    if (score === 2) return { score: 2, label: 'Fair', color: '#fbbf24' };
    if (score === 3) return { score: 3, label: 'Good', color: '#22c55e' };
    return { score: 4, label: 'Strong', color: 'var(--accent)' };
  }

  document.getElementById('new-password').addEventListener('input', function() {
    const v = this.value;
    if (!v) {
      document.getElementById('strength-bar').style.width = '0';
      document.getElementById('strength-label').textContent = '';
      return;
    }
    const { score, label, color } = getPasswordStrength(v);
    const bar = document.getElementById('strength-bar');
    bar.style.width = (score / 4 * 100) + '%';
    bar.style.background = color;
    document.getElementById('strength-label').textContent = label;
    document.getElementById('strength-label').style.color = color;
  });

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('new-password').value;
    const confirm  = document.getElementById('confirm-password').value;

    const showErr = (msg) => {
      const el = document.getElementById('alert-error');
      el.textContent = msg; el.classList.add('visible');
      document.getElementById('alert-success').classList.remove('visible');
    };

    if (!email) return showErr('Email is required.');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showErr('Invalid email address.');
    if (password.length < 8) return showErr('Password must be at least 8 characters.');
    if (!/[A-Z]/.test(password) || !/[0-9]/.test(password)) return showErr('Password needs 1 uppercase letter and 1 number.');
    if (password !== confirm) return showErr('Passwords do not match.');

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Resetting…';

    try {
      // Logic from provided HTML
      // However, we should use Auth.js if it supports reset? 
      // The provided HTML has custom logic using USERS_KEY.

      const result = await Auth.resetPassword(email, password);

      if (!result.ok) {
        // Handle failure based on your backend.
        // If your backend doesn't support local password reset bypass, this will fail.
        // For now, I'll follow the local storage logic provided if that's the intended mock.
        
        // But the provided script has:
        const USERS_KEY = '__lf_users_v2__';
        const emailBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(email.toLowerCase().trim()));
        const emailKey = Array.from(new Uint8Array(emailBuf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,32);
        const db = JSON.parse(localStorage.getItem(USERS_KEY) || '{}');

        if (!db[emailKey]) {
          document.getElementById('alert-error').classList.remove('visible');
          const ok = document.getElementById('alert-success');
          ok.textContent = 'If an account with that email exists, your password has been reset. Please sign in.';
          ok.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
          return;
        }

        const salt    = crypto.getRandomValues(new Uint8Array(16));
        const saltHex = Array.from(salt).map(b => b.toString(16).padStart(2,'0')).join('');
        const keyMat  = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), { name: 'PBKDF2' }, false, ['deriveBits']);
        const bits    = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' }, keyMat, 256);
        const newHash = Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2,'0')).join('');

        db[emailKey].hash = newHash;
        db[emailKey].salt = saltHex;
        localStorage.setItem(USERS_KEY, JSON.stringify(db));

        sessionStorage.removeItem('__lf_session__');

        const ok = document.getElementById('alert-success');
        ok.textContent = 'Password reset! Redirecting to sign in…';
        ok.classList.add('visible');
        document.getElementById('alert-error').classList.remove('visible');
        setTimeout(() => { window.location.href = './login.html'; }, 1500);
      }
    } catch (err) {
      showErr('An error occurred. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  });
</script>
</body>
</html>
