<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Generator - Limitless</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="style.css">
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: var(--bg); color: var(--text-1); padding: 2rem; font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; }
    .container { max-width: 800px; margin: 0 auto; }
    .gen-card { background: var(--bg-2); padding: 2rem; border-radius: var(--radius-lg); margin-bottom: 2rem; box-shadow: var(--shadow-md); border: 1px solid var(--border); }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-2); font-weight: 600; font-size: 0.9rem;}
    .form-control { font-family: 'Inter', sans-serif; width: 100%; padding: 0.8rem 1.2rem; background: var(--bg-1); border: 1px solid var(--border); color: var(--text-1); border-radius: var(--radius-md); box-sizing: border-box; transition: var(--transition); outline: none; }
    .form-control:focus { border-color: var(--primary-color); background: var(--bg); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
    .plan-result { display: none; margin-top: 2rem; padding: 2rem; background: var(--bg-2); border: 1px solid var(--primary-color); border-radius: var(--radius-lg); animation: slideUp 0.5s ease-out forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 3rem;">
      <a href="index.html" style="text-decoration:none;">
        <h2 style="margin: 0;"><i class="fa-solid fa-infinity" style="color:var(--primary-color);"></i> Limitless <span style="font-weight:400; color:var(--text-2);">Generator</span></h2>
      </a>
      <div class="nav-actions">
        <a href="dashboard.html" class="btn btn-outline" style="padding: 0.5rem 1rem;"><i class="fas fa-arrow-left"></i> Dashboard</a>
        <button class="theme-toggle-btn" aria-label="Toggle theme">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </div>

    <div class="glass-card" id="generatorCard">
      <p style="color: var(--text-2); margin-bottom: 2rem; line-height:1.6; font-size: 0.95rem;">Our algorithmic engine crafts a high-performance protocol based on your biometrics, regional cuisine, and cultural modifiers.</p>
      
      <form id="generatorForm">
        <div style="display:flex; gap: 1.5rem; margin-bottom: 1.5rem;">
          <div class="form-group" style="flex:1; margin-bottom: 0;">
            <label>Age</label>
            <input type="number" id="age" class="form-control" placeholder="25" min="14" max="100">
          </div>
          <div class="form-group" style="flex:1; margin-bottom: 0;">
            <label>Weight (kg)</label>
            <input type="number" id="weight" class="form-control" placeholder="75" min="30" max="250" required>
          </div>
        </div>

        <div class="form-group">
          <label>Transformation Goal</label>
          <select id="goal" class="form-control" required>
            <option value="muscle-gain">Hypertrophy (Muscle Gain)</option>
            <option value="fat-loss">Cutting (Fat Loss)</option>
            <option value="maintain">Body Recomposition</option>
          </select>
        </div>

        <div class="form-group">
          <label>Dietary Paradigm</label>
          <select id="pref" class="form-control" required>
            <option value="veg">Vegetarian</option>
            <option value="vegan">Vegan</option>
            <option value="non-veg">Omnivore (Non-Veg)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Cultural Modifiers</label>
          <select id="region" class="form-control" required>
            <option value="indian">Indian (Spices &amp; Staples)</option>
            <option value="western">Western Standard (Pantry)</option>
            <option value="jain">Jain (No Onion/Garlic)</option>
            <option value="halal">Halal Certified Sources</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-glow" style="padding: 1rem; font-size:1rem; margin-top:1rem;">
          <i class="fas fa-bolt"></i> Generate Master Plan
        </button>
      </form>
    </div>

    <!-- Error message box -->
    <div id="errorMsg" style="display:none; margin-top:1.5rem; padding:1rem 1.5rem; background:rgba(239,68,68,0.1); border:1px solid #ef4444; border-radius:12px; color:#ef4444; font-weight:600; font-size:14px;"></div>

    <!-- Result panel -->
    <div id="planResult" class="plan-result glass-card" style="margin-top: 2rem; background: var(--bg-2); border-color: var(--primary-color);">
      <h3 style="margin-bottom: 1rem; color: var(--primary-color); font-weight: 700;">Your Limitless Protocol</h3>

      <div style="font-size: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 1.5rem; color: var(--text-1);">
        <strong>🔥 Daily Target:</strong> <span id="resCalories" style="font-weight:800; color:var(--primary-color);"></span> Kcal
      </div>

      <div style="margin-bottom:1.5rem; padding:1rem; background:rgba(0,200,150,0.06); border:1px solid rgba(0,200,150,0.2); border-radius:10px;">
        <h4 style="margin:0 0 8px 0; color:var(--text-1);"><i class="fas fa-info-circle" style="color:var(--primary-color);"></i> Diet Framework</h4>
        <p id="resDietSummary" style="color:var(--text-2); margin:0; font-size:0.9rem; line-height:1.6;"></p>
      </div>
      
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
        <div>
          <h4 style="margin-bottom: 1rem; color: var(--text-1); display:flex; align-items:center; gap:8px;">
            <i class="fas fa-utensils" style="color:var(--primary-color);"></i> Daily Meal Plan
          </h4>
          <ul id="resDiet" style="color: var(--text-2); line-height: 1.8; padding-left: 1.2rem; font-size: 0.9rem;"></ul>
        </div>
        <div>
          <h4 style="margin-bottom: 1rem; color: var(--text-1); display:flex; align-items:center; gap:8px;">
            <i class="fas fa-dumbbell" style="color:var(--primary-color);"></i> Training Split
          </h4>
          <ul id="resRoutine" style="color: var(--text-2); line-height: 1.8; padding-left: 1.2rem; font-size: 0.9rem;"></ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Map generator.html dropdown values → server-expected field values ──────
    // server.js /api/generate-plan expects: { weight, goal, dietPref, religion, geography }
    const GOAL_MAP     = { 'muscle-gain': 'bulk',     'fat-loss': 'cut',           'maintain': 'maintain'       };
    const DIET_MAP     = { 'veg':         'balanced', 'vegan':    'vegan',          'non-veg':  'balanced'       };
    const RELIGION_MAP = { 'indian':      'none',     'western':  'none',           'jain':     'jain', 'halal': 'halal' };
    const GEO_MAP      = { 'indian':      'indian',   'western':  'western',        'jain':     'indian',        'halal': 'middle-eastern' };

    document.getElementById('generatorForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const errorDiv = document.getElementById('errorMsg');
      errorDiv.style.display = 'none';

      const weight  = (document.getElementById('weight').value || '').trim();
      const goalRaw = document.getElementById('goal').value;
      const prefRaw = document.getElementById('pref').value;
      const region  = document.getElementById('region').value;

      // Validate weight
      if (!weight || isNaN(+weight) || +weight < 30 || +weight > 250) {
        errorDiv.textContent = '⚠️ Please enter a valid weight between 30–250 kg.';
        errorDiv.style.display = 'block';
        return;
      }

      const btn = e.target.querySelector('button[type="submit"]');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating your plan...';
      btn.disabled  = true;

      // Build payload using the correct server field names
      const payload = {
        weight,
        goal:      GOAL_MAP[goalRaw]     || 'maintain',
        dietPref:  DIET_MAP[prefRaw]     || 'balanced',
        religion:  RELIGION_MAP[region]  || 'none',
        geography: GEO_MAP[region]       || 'indian'
      };

      try {
        const res  = await fetch('/api/generate-plan', {
          method: 'POST',
          credentials: 'include',                             // sends auth cookie
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          const msg = data.error || `Server error (${res.status}). Please log in first.`;
          errorDiv.textContent  = '⚠️ ' + msg;
          errorDiv.style.display = 'block';
          return;
        }

        // Parse calorie number out of the diet string e.g. "2200 kcal/day. Focus on..."
        const calMatch = (data.diet || '').match(/(\d[\d,]+)\s*kcal/i);
        document.getElementById('resCalories').textContent    = calMatch ? calMatch[1] : '—';
        document.getElementById('resDietSummary').textContent = data.diet || '';

        // data.dailyMeals = ["Breakfast: ...", "Lunch: ...", ...]
        document.getElementById('resDiet').innerHTML =
          (data.dailyMeals || []).map(m => `<li style="margin-bottom:6px;">${m}</li>`).join('');

        // data.routine = ["Day 1: Heavy Push...", "Day 2: ...", ...]
        document.getElementById('resRoutine').innerHTML =
          (data.routine || []).map(r => `<li style="margin-bottom:6px;">${r}</li>`).join('');

        const resultEl = document.getElementById('planResult');
        resultEl.style.display = 'block';
        resultEl.scrollIntoView({ behavior: 'smooth' });

      } catch (err) {
        console.error('Generator error:', err);
        errorDiv.textContent  = '⚠️ Network error — ensure the server is running on port 5000.';
        errorDiv.style.display = 'block';
      } finally {
        btn.innerHTML = '<i class="fas fa-bolt"></i> Generate Master Plan';
        btn.disabled  = false;
      }
    });
  </script>
  <script src="cursor.js"></script>
  <script src="js/ai-coach.js"></script>
</body>
</html>
